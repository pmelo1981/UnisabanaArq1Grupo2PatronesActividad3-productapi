apiVersion: v1
kind: Namespace
metadata:
  name: productapi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: productapi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pmelo1981/UnisabanaArq1Grupo2PatronesActividad3
    targetRevision: main
    path: helm
    helm:
      releaseName: productapi
      values: |
        replicaCount: 2
        image:
          repository: productapi
          tag: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: productapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
